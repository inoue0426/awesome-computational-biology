<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resource Overview — Awesome Computational Biology</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
      margin-top: 1.25rem;
    }

    .stat-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      margin-top: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1rem;
      text-align: center;
      box-shadow: var(--card-shadow);
    }

    .stat-card .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.1;
    }

    .stat-card .stat-label {
      font-size: .82rem;
      color: var(--muted);
      margin-top: .3rem;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.1rem 1.3rem;
      box-shadow: var(--card-shadow);
    }

    .chart-card h2 {
      font-size: .97rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .9rem;
    }

    .chart-card canvas {
      max-width: 100%;
    }

    .nav-link {
      display: inline-block;
      margin-bottom: 1rem;
      font-size: .9rem;
      color: var(--primary);
      text-decoration: none;
    }

    .nav-link:hover { text-decoration: underline; }

    .overview-png {
      margin: 1.5rem 0;
      text-align: center;
    }

    .overview-png img {
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--card-shadow);
    }
  </style>
</head>
<body>
  <header>
    <h1>🧬 Awesome Computational Biology</h1>
    <p class="subtitle">Resource Landscape Overview</p>
  </header>

  <main>
    <a class="nav-link" href="index.html">← Back to resource browser</a>

    <div class="stat-row" id="stat-row">
      <div class="stat-card"><div class="stat-value" id="stat-total">…</div><div class="stat-label">Total Resources</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-types">…</div><div class="stat-label">Resource Types</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-tasks">…</div><div class="stat-label">Unique Tasks</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-modalities">…</div><div class="stat-label">Unique Modalities</div></div>
    </div>

    <div class="overview-grid">
      <div class="chart-card">
        <h2>Resources by Type</h2>
        <canvas id="chart-type" height="260"></canvas>
      </div>
      <div class="chart-card">
        <h2>Top 10 Tasks</h2>
        <canvas id="chart-task" height="260"></canvas>
      </div>
      <div class="chart-card">
        <h2>Top 10 Modalities</h2>
        <canvas id="chart-modality" height="260"></canvas>
      </div>
      <div class="chart-card">
        <h2>Type Distribution</h2>
        <canvas id="chart-type-pie" height="260"></canvas>
      </div>
    </div>

    <div class="overview-png">
      <img src="overview.png" alt="Static overview figure of the Awesome Computational Biology resource landscape" />
    </div>
  </main>

  <footer>
    <p>
      View on <a href="https://github.com/inoue0426/awesome-computational-biology" target="_blank" rel="noopener noreferrer">GitHub</a>
      · Data from <code>data/resources.json</code>
    </p>
  </footer>

  <!-- Chart.js from CDN (no build step needed) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
  (function () {
    'use strict';

    var DATA_URL = 'data/resources.json';

    var TYPE_COLORS = {
      database:  '#2a9d8f',
      model:     '#2c7be5',
      toolkit:   '#e9c46a',
      benchmark: '#9b5de5',
      api:       '#e76f51'
    };
    var DEFAULT_COLOR = '#adb5bd';
    var TASK_COLOR     = '#3a86ff';
    var MODALITY_COLOR = '#06d6a0';

    function countField(resources, field) {
      var counts = {};
      resources.forEach(function (r) {
        var v = r[field];
        if (Array.isArray(v)) {
          v.forEach(function (x) { counts[x] = (counts[x] || 0) + 1; });
        } else if (v) {
          counts[v] = (counts[v] || 0) + 1;
        }
      });
      return counts;
    }

    function sortedEntries(obj, limit) {
      var entries = Object.entries(obj).sort(function (a, b) { return b[1] - a[1]; });
      return limit ? entries.slice(0, limit) : entries;
    }

    function makeBarChart(id, labels, values, color, horizontal) {
      var ctx = document.getElementById(id).getContext('2d');
      var isH = !!horizontal;
      return new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: [{ data: values, backgroundColor: color, borderRadius: 4, borderSkipped: false }]
        },
        options: {
          indexAxis: isH ? 'y' : 'x',
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: isH ? '#f0f0f0' : undefined, display: isH ? undefined : false }, ticks: { color: '#6c757d', font: { size: 11 } } },
            y: { grid: { color: isH ? undefined : '#f0f0f0', display: isH ? false : undefined }, ticks: { color: '#6c757d', font: { size: 11 } } }
          }
        }
      });
    }

    function makePieChart(id, labels, values, colors) {
      var ctx = document.getElementById(id).getContext('2d');
      return new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{ data: values, backgroundColor: colors, borderWidth: 2, borderColor: '#fff' }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#495057', font: { size: 11 }, padding: 10, boxWidth: 14 }
            }
          }
        }
      });
    }

    fetch(DATA_URL)
      .then(function (res) { if (!res.ok) throw new Error('HTTP ' + res.status); return res.json(); })
      .then(function (data) {
        var resources = Array.isArray(data) ? data : [];

        var typeCounts     = countField(resources, 'type');
        var taskCounts     = countField(resources, 'tasks');
        var modalityCounts = countField(resources, 'modalities');

        // Stats
        document.getElementById('stat-total').textContent      = resources.length;
        document.getElementById('stat-types').textContent      = Object.keys(typeCounts).length;
        document.getElementById('stat-tasks').textContent      = Object.keys(taskCounts).length;
        document.getElementById('stat-modalities').textContent = Object.keys(modalityCounts).length;

        // Type bar chart
        var typeEntries = sortedEntries(typeCounts);
        var typeLabels  = typeEntries.map(function (e) { return e[0]; });
        var typeValues  = typeEntries.map(function (e) { return e[1]; });
        var typeColors  = typeLabels.map(function (t) { return TYPE_COLORS[t] || DEFAULT_COLOR; });
        makeBarChart('chart-type', typeLabels, typeValues, typeColors, false);

        // Task horizontal bar
        var taskEntries = sortedEntries(taskCounts, 10).reverse();
        makeBarChart('chart-task',
          taskEntries.map(function (e) { return e[0]; }),
          taskEntries.map(function (e) { return e[1]; }),
          TASK_COLOR, true
        );

        // Modality horizontal bar
        var modEntries = sortedEntries(modalityCounts, 10).reverse();
        makeBarChart('chart-modality',
          modEntries.map(function (e) { return e[0]; }),
          modEntries.map(function (e) { return e[1]; }),
          MODALITY_COLOR, true
        );

        // Type doughnut
        makePieChart('chart-type-pie', typeLabels, typeValues, typeColors);
      })
      .catch(function (err) {
        document.querySelector('main').insertAdjacentHTML('afterbegin',
          '<p style="color:#dc3545;padding:1rem;">Failed to load data: ' + err.message + '</p>');
      });
  })();
  </script>
</body>
</html>
