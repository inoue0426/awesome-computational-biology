name: Generate data artifacts

on:
  push:
    paths:
      - 'data/resources.yml'
  pull_request:
    paths:
      - 'data/resources.yml'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Generate JSON and CSV
        run: python scripts/generate_artifacts.py

      - name: Commit artifacts (push events only)
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/resources.json data/resources.csv
          git diff --cached --quiet || git commit -m "chore: regenerate resources.json and resources.csv"
          git push
